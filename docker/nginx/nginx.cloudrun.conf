# nginx.cloudrun.conf — Cloud Run sidecar: HTTP only on port 8080
#
# Traffic flow:
#   Internet (HTTPS) → Google's Load Balancer (TLS termination) → Cloud Run (HTTP :8080)
#   nginx (HTTP :8080) → app container (HTTP :8000, same localhost namespace)
#
# Cloud Run multi-container instances share a localhost network namespace.
# nginx and the app container communicate via localhost, not by service name.
# Google's load balancer handles all TLS — no ssl_* directives needed here.

server {
    # Cloud Run expects the container to listen on 8080 (or the PORT env var).
    # We listen on 8080 and proxy to the FastAPI process on 8000 (localhost).
    listen 8080;
    server_name _;

    # Security headers (TLS is already enforced upstream by Google's LB)
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        # "localhost:8000" — the FastAPI container in the same Cloud Run instance
        proxy_pass http://localhost:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Google's LB sets X-Forwarded-Proto correctly; pass it through
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Generous timeouts for Gemini/API calls
        proxy_read_timeout 330s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 330s;
    }
}
