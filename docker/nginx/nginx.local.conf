# nginx.local.conf — Local development: HTTPS with self-signed certificate
#
# Traffic flow:
#   Browser (HTTPS :443) → nginx (TLS termination) → app container (HTTP :8000)
#   Browser (HTTP  :80 ) → nginx → 301 redirect → HTTPS
#
# To generate certs: run ./scripts/gen_certs.sh once before `docker compose up`

# Redirect all plain HTTP to HTTPS
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    # Self-signed cert — generated by scripts/gen_certs.sh
    ssl_certificate     /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Session reuse for performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Proxy to FastAPI container
    # "app" is the Docker Compose service name resolved via Docker's internal DNS
    location / {
        proxy_pass http://app:8000;

        # Pass real client info to the upstream application
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (future-proof)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts (generous for Gemini/API calls which can be slow)
        proxy_read_timeout 330s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 330s;
    }
}
